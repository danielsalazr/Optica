[uwsgi]
#http = localhost:8089
#http-socket = :8088
chdir=/home/projects/optica/optica
#module=optica.wsgi:application
module=optica.wsgi
home=/home/projects/optica/venv/
master=true
processes=2
socket=/home/projects/optica/optica/mi_socket.sock
chmod-socket = 666
vacuum=true

#reinicar el servicio si se hacen cambios y ejecutarlos
py-autoreload = 1
lazy-apps = true
touch-reload=/home/projects/optica/optica/optica/wsgi.py
daemonize = /home/projects/optica/optica/logs/access.log

